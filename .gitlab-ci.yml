stages:
  - validate
  - deploy

default:
  interruptible: true
  retry: 1

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  ANSIBLE_DIR: "reverse-proxy/ansible"
  # Control node (where Ansible is executed)
  DEPLOY_HOST: "10.7.57.203"
  DEPLOY_USER: "ansible"
  REMOTE_BASE_DIR: "/tmp/megacable-reverse-proxy"
  # Avoid interactive SSH prompts in CI
  GIT_STRATEGY: fetch

.ssh_setup: &ssh_setup
  - apk add --no-cache openssh-client bash coreutils tar
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - |
    if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
      echo "Missing SSH_PRIVATE_KEY CI variable" >&2
      exit 1
    fi
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - |
    if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
      echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      chmod 644 ~/.ssh/known_hosts
    else
      ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      chmod 644 ~/.ssh/known_hosts
    fi

validate:ansible:
  stage: validate
  image: python:3.13-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  before_script:
    - apk add --no-cache bash openssh-client git
    - python -m pip install --no-cache-dir ansible==10.* ansible-lint==24.*
  script:
    - cd "$ANSIBLE_DIR"
    - ansible-playbook -i inventory.ini playbook.yml --syntax-check
    - ansible-lint -v . | tee ansible-lint.txt
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - "$ANSIBLE_DIR/ansible-lint.txt"

deploy:ansible:
  stage: deploy
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: false
    - when: never
  environment:
    name: production
  before_script:
    - *ssh_setup
  script:
    - |
      set -euo pipefail

      ARCHIVE="repo-${CI_COMMIT_SHORT_SHA}.tar.gz"
      tar -czf "$ARCHIVE" \
        --exclude=".git" \
        --exclude=".gitlab" \
        --exclude="**/.DS_Store" \
        .

      REMOTE_DIR="${REMOTE_BASE_DIR}/${CI_PROJECT_PATH_SLUG}/${CI_COMMIT_SHA}"
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${REMOTE_DIR}'"
      scp "$ARCHIVE" "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/"

      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${REMOTE_DIR}' && tar -xzf '${ARCHIVE}'"

      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${REMOTE_DIR}/${ANSIBLE_DIR}' && ansible-playbook -i inventory.ini playbook.yml ${ANSIBLE_ARGS:-}"

