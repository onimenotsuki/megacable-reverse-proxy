worker_processes auto;

error_log  /var/log/megacable-reverse-proxy/error.log warn;
pid        /run/megacable-reverse-proxy/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;

  # Prefer explicit timeouts to avoid hanging connections.
  proxy_connect_timeout 5s;
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;

  # Allow larger payloads if needed by upstream APIs.
  client_max_body_size 20m;

  # If the upstream LB sends X-Forwarded-Proto, preserve it.
  # Otherwise, fallback to $scheme (likely "http" since TLS terminates upstream).
  map $http_x_forwarded_proto $meg_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
  }

  log_format megacable_main '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rt=$request_time urt=$upstream_response_time '
                            'ua="$upstream_addr" us="$upstream_status" '
                            'rid="$request_id"';

  access_log /var/log/megacable-reverse-proxy/access.log megacable_main;

  # Keep conf self-contained so the unit can run Nginx without touching /etc/nginx/conf.d.
  include /etc/megacable-reverse-proxy/conf.d/*.conf;
}

