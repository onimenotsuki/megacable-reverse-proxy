}

upstream image_pool {
  server 10.7.50.71:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.72:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.73:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.74:80 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

server {
  listen 80;
  server_name web.xviewplusn2.com.mx;

  # Preserve original host by default (most compatible).
  proxy_set_header Host              $host;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Forwarded-Proto $meg_x_forwarded_proto;

  # Keep connections stable for upstreams.
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # CORS: allow browser calls from the Web UI origin only.
  # This is required for cross-origin API calls (e.g. when the UI runs on https
  # and the API is accessed through a different origin).
  # Use "null" as a safe default: it won't match real browser Origins.
  set $cors_allow_origin "null";
  if ($http_origin ~* '^https?://web\\.xviewplusn2\\.com\\.mx$') {
    set $cors_allow_origin $http_origin;
  }

  add_header Access-Control-Allow-Origin $cors_allow_origin always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Requested-With, If-Modified-Since, Range" always;
  add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # SQUID routes (HTTP:3128)
  location = /RTEFacade        { proxy_pass http://squid_pool; }
  location ^~ /RTEFacade/      { proxy_pass http://squid_pool; }

  location = /compass          { proxy_pass http://squid_pool; }
  location ^~ /compass/        { proxy_pass http://squid_pool; }

  location = /search           { proxy_pass http://squid_pool; }
  location ^~ /search/         { proxy_pass http://squid_pool; }

  location = /personalization  { proxy_pass http://squid_pool; }
  location ^~ /personalization/{ proxy_pass http://squid_pool; }

  location = /SessionManagement { proxy_pass http://squid_pool; }
  location ^~ /SessionManagement/ { proxy_pass http://squid_pool; }

  # BFF routes (HTTP:80)
  location ^~ /rtvbff/linear { proxy_pass http://bff_linear_pool; }
  location ^~ /rtvbff/vod    { proxy_pass http://bff_vod_pool; }
  location ^~ /rtvbff/image  { proxy_pass http://image_pool; }

  # Default: fail closed to avoid accidentally proxying unknown paths.
  location / {
    return 404;
  }
}

