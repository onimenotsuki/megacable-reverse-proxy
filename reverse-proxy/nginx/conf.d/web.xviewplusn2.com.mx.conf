upstream squid_pool {
  server 10.7.50.11:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.12:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.13:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.14:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.15:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.16:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.17:3128 max_fails=3 fail_timeout=10s;
  server 10.7.50.18:3128 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

upstream bff_linear_pool {
  server 10.7.50.46:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.47:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.48:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.49:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.50:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.51:80 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

upstream bff_vod_pool {
  server 10.7.50.61:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.62:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.63:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.64:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.65:80 max_fails=3 fail_timeout=10s;
  server 10.7.50.66:80 max_fails=3 fail_timeout=10s;
